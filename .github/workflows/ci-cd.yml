name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run ESLint
        run: yarn eslint .

      - name: Build application
        run: yarn build

  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT != '' && secrets.SSH_PORT || '22' }}
      SSH_USER: ${{ secrets.SSH_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH != '' && secrets.DEPLOY_BRANCH || 'main' }}
      PM2_APP_NAME: ${{ secrets.PM2_APP_NAME != '' && secrets.PM2_APP_NAME || 'aura-front' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy on server
        env:
          APP_ENV_PRODUCTION: ${{ secrets.APP_ENV_PRODUCTION }}
        run: |
          APP_ENV_PRODUCTION_B64="$(printf '%s' "$APP_ENV_PRODUCTION" | base64 | tr -d '\n')"

          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "export DEPLOY_PATH='$DEPLOY_PATH' DEPLOY_BRANCH='$DEPLOY_BRANCH' PM2_APP_NAME='$PM2_APP_NAME' APP_ENV_PRODUCTION_B64='$APP_ENV_PRODUCTION_B64'; bash -se" <<'EOF'
          set -euo pipefail

          if [ -s "$HOME/.nvm/nvm.sh" ]; then
            . "$HOME/.nvm/nvm.sh"
            nvm install 20
            nvm use 20
          fi

          cd "$DEPLOY_PATH"

          git checkout "$DEPLOY_BRANCH"
          git pull --ff-only origin "$DEPLOY_BRANCH"

          printf '%s' "$APP_ENV_PRODUCTION_B64" | base64 --decode > .env.production

          corepack enable
          yarn install --immutable
          yarn build
          pm2 startOrReload ecosystem.config.js --env production --only "$PM2_APP_NAME"
          pm2 save
          EOF
